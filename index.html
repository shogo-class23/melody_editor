<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>メロディーエディター</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #1a1a1a; color: white; margin: 0; overflow: hidden; }
        .container { display: flex; flex-direction: column; height: 100vh; }
        
        #ui { padding: 10px; background: #222; border-bottom: 1px solid #444; z-index: 10000; position: relative; }
        .btn { padding: 8px 12px; font-size: 12px; cursor: pointer; border: none; border-radius: 10px; font-weight: bold; margin: 2px; color: white; }

        /* トラック全体のコンテナ */
        #tracks-wrapper { 
            flex-grow: 1; display: flex; overflow-x: auto; overflow-y: hidden; 
            background: #000; position: relative;
        }

        /* 各楽器のレーン */
        .track-lane { 
            position: relative; min-width: 350px; height: 100%; border-right: 2px solid #333;
            display: flex; flex-direction: column;
        }
        
        .track-header { 
            position: sticky; top: 0; background: #222; z-index: 500; 
            border-bottom: 2px solid #444; flex-shrink: 0;
            height: 66px;
        }
        .track-label { padding: 4px; font-weight: bold; color: #fff; font-size: 14px; text-shadow: 1px 1px 2px #000; }

        /* 音符を置くエリア */
        .lane-content { 
            position: relative; flex-grow: 1; overflow-y: auto; background: #000;
            /* 小節線（強調）と拍線（薄い）のグリッド背景 */
            background-image: 
                linear-gradient(rgba(255,255,255,0.2) 2px, transparent 2px),
                linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 100% 320px, 100% 80px; 
            scrollbar-width: thin;
        }
        .lane-content::-webkit-scrollbar { width: 8px; }
        .lane-content::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }

        .note-block { position: absolute; border-radius: 4px; font-size: 11px; font-weight: bold; color: white; display: flex; justify-content: center; align-items: center; cursor: grab; user-select: none; box-shadow: 0 0 5px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2); min-height: 15px; box-sizing: border-box; }
        
        .resizer { 
            position: absolute; bottom: 0; left: 0; width: 100%; height: 8px; 
            cursor: ns-resize; background: rgba(255,255,255,0.25); border-radius: 0 0 4px 4px; 
            z-index: 20; 
        }
        .resizer:hover { background: rgba(255,255,255,0.6); }

        .note-block.selected { border: 2px solid yellow; box-shadow: 0 0 10px yellow; z-index: 50; }
        .note-block.playing { border: 3px solid white; box-shadow: 0 0 20px white; z-index: 100; background-color: #fff !important; color: #000; }
        
        .lyrics-block {
            background-color: #00e676 !important;
            color: #000 !important;
            font-size: 14px !important;
            border: 1px solid #fff !important;
            justify-content: flex-start !important;
            padding-left: 5px;
            overflow: visible !important;
            white-space: nowrap;
        }
        .lyrics-block .note-label {
            width: 100%;
            text-align: left;
        }

        .marquee {
            position: absolute; border: 1px solid #2196f3; background: rgba(33, 150, 243, 0.2);
            pointer-events: none; z-index: 3000;
        }
        
        .playhead {
            position: absolute; left: 0; width: 100%; height: 3px; background: red;
            box-shadow: 0 0 8px red; z-index: 6000; pointer-events: none; display: block;
            top: 0;
        }

        /* 鍵盤を上部に配置 */
        .piano-container { display: flex; height: 40px; width: 100%; background: #333; overflow-x: auto; scrollbar-width: none; }
        .piano-container::-webkit-scrollbar { display: none; }
        .key { border: 1px solid #000; height: 100%; min-width: 20px; flex-grow: 1; background: white; border-radius: 0 0 3px 3px; position: relative; cursor: pointer; display: flex; align-items: flex-end; justify-content: center; font-size: 8px; color: #888; padding-bottom: 2px; }
        .key.black { background: black; min-width: 14px; flex-grow: 0.7; margin-left: -7px; margin-right: -7px; z-index: 2; height: 60%; }
        .key.active { background: #ff4785 !important; }

        /* レイアウト構造 */
        #editor-layout { display: flex; flex-grow: 1; overflow: hidden; position: relative; }

        /* 左側固定セクションバー */
        #section-sidebar { 
            width: 100px; background: #222; border-right: 2px solid #444; 
            display: flex; flex-direction: column; flex-shrink: 0; z-index: 1000;
        }
        #section-header { 
            height: 66px; background: #333; border-bottom: 2px solid #444; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 12px; font-weight: bold; position: relative; z-index: 20; 
        }
        #section-container { position: relative; flex-grow: 1; background: #1a1a1a; overflow: hidden; }
        
        /* 小節番号表示用 */
        #measure-numbers {
            position: absolute; top: 0; left: 0; width: 100%; pointer-events: none; z-index: 1;
        }
        .measure-number {
            position: absolute; left: 5px; width: 90%; border-top: 1px solid rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.4); font-size: 11px; font-weight: bold; padding-top: 2px;
        }

        .section-block { 
            position: absolute; width: 100%; background: #555; color: white; border: 1px solid #888;
            cursor: pointer; text-align: center; box-sizing: border-box; display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 12px; z-index: 10;
        }
        .section-block.selected { border: 2px solid #ffeb3b; background: #444; box-shadow: inset 0 0 10px rgba(255,235,59,0.3); }
        
        /* リサイズバー */
        .section-resizer { 
            position: absolute; bottom: 0; width: 100%; height: 15px; 
            cursor: ns-resize; background: rgba(255,255,255,0.1); 
            z-index: 25; 
        }
        .section-resizer:hover { background: rgba(255,255,255,0.4); }
        
        .section-block span { pointer-events: none; user-select: none; }
        
        /* 全レーンを貫通する白い線 */
        .section-line {
            position: absolute; left: 0; width: 10000px; border-top: 2px dashed rgba(255, 255, 255, 0.8);
            z-index: 5000; pointer-events: auto; cursor: pointer;
        }
        .section-line::after {
            content: ""; position: absolute; top: -10px; left: 0; width: 100%; height: 20px;
        }
    </style>
</head>
<body>
<div class="container">
    <div id="ui">
        <button id="toggleBtn" class="btn" style="background:#4caf50;" onclick="toggleMic()">録音開始</button>
        <button class="btn" style="background:#607d8b;" onclick="rewindToStart()">⏮ 最初へ</button>
        <button id="playBtn" class="btn" style="background:#ff9800;" onclick="playMelody()">▶ 再生</button>
        <button id="stopBtn" class="btn" style="background:#607d8b;" onclick="stopMelody()">■ 停止</button>
        <button class="btn" style="background:#673ab7;" onclick="undo()">↩ 戻る</button>
        <button class="btn" style="background:#673ab7;" onclick="redo()">↪ 進む</button>
        <button class="btn" style="background:#2196f3;" onclick="mergeSelected()">合体</button>
        <button class="btn" style="background:#9c27b0;" onclick="splitSelected()">分割</button>
        <button class="btn" style="background:#00bcd4;" onclick="alignNoteEnds()">📏 お尻を揃える</button>
        <button class="btn" style="background:#ff5722;" onclick="shiftOctave(1)">⬆ オクターブ</button>
        <button class="btn" style="background:#ff5722;" onclick="shiftOctave(-1)">⬇ オクターブ</button>
        <button class="btn" style="background:#ffc107; color: black;" onclick="generateChord()">✨ 和音作成</button>
        <button class="btn" style="background:#7e57c2;" onclick="generateBass()">🎸 ベース作成</button>
        <button class="btn" style="background:#ff7043;" onclick="generateGuitar()">🎸 ギター作成</button>
        <button class="btn" style="background:#00e676; color: black;" onclick="generateLyricsFromMelody()">🎤 歌詞作成</button>
        <select id="chordSize" class="btn" style="background:#333; color:white; border:1px solid #ff7043;">
            <option value="3">3和音</option>
            <option value="4">4和音</option>
            <option value="5">5和音</option>
            <option value="6">6和音</option>
            <option value="7">7和音</option>
        </select>
        <button class="btn" style="background:#f44336;" onclick="deleteSelected()">消去</button>
        <button class="btn" style="background:#607d8b;" onclick="copySelected()">📄 コピー</button>
        <button class="btn" style="background:#607d8b;" onclick="pasteSelected()">📋 貼付</button>
        <span style="margin: 0 10px; border-left: 1px solid #555;"></span>
        <button class="btn" style="background:#009688;" onclick="saveToFile()">💾 保存</button>
        <button class="btn" style="background:#795548;" onclick="loadFromFile()">📂 開く</button>
        <button class="btn" style="background:#e91e63;" onclick="newProject()">🆕 新規</button>
        <input type="file" id="fileInput" style="display:none" accept=".json" onchange="handleFileSelect(event)">
        <span style="margin: 0 10px; border-left: 1px solid #555;"></span>
        <label style="font-size: 12px; vertical-align: middle;">現在の楽器:</label>
        <select id="currentInst" class="btn" style="background:#333; color:white; border:1px solid #ff9800;">
            <option value="lyrics">🎤 歌詞</option>
            <option value="melody" selected>🎹 メロディー</option>
            <option value="piano">🎹 ピアノ</option>
            <option value="guitar">🎸 ギター</option>
            <option value="bass">🎸 ベース</option>
            <option value="drums">🥁 ドラム</option>
            <option value="synth">✨ シンセ</option>
            <option value="flute">🌬️ フルート</option>
        </select>
        <label style="font-size: 12px; vertical-align: middle; margin-left:10px;">速さ:</label>
        <input type="range" id="speedSlider" min="40" max="200" value="80" step="10" oninput="updateSpeed(this.value)" style="vertical-align: middle;">
        <span id="speedValue" style="font-size: 12px; width: 25px; display: inline-block;">80</span>
        <label style="font-size: 12px; vertical-align: middle; margin-left:10px; color: #00e676; font-weight: bold;">
            キー:
            <select id="keySelect" class="btn" style="background:#333; color:white; border:1px solid #00e676; padding: 2px 5px; font-size: 11px;">
                <option value="0">C (ド)</option>
                <option value="1">C#</option>
                <option value="2">D (レ)</option>
                <option value="3">D#</option>
                <option value="4">E (ミ)</option>
                <option value="5">F (ファ)</option>
                <option value="6">F#</option>
                <option value="7">G (ソ)</option>
                <option value="8">G#</option>
                <option value="9">A (ラ)</option>
                <option value="10">A#</option>
                <option value="11">B (シ)</option>
            </select>
        </label>
        <button class="btn" style="background:#00e676; color: black; padding: 2px 8px;" onclick="detectKeyFromMelody()">🔍 キー判定</button>
        <span style="margin: 0 10px; border-left: 1px solid #555;"></span>
        <select id="progSelect" class="btn" style="background:#333; color:white; border:1px solid #2196f3; padding: 2px 5px; font-size: 11px;">
            <option value="canon">カノン進行</option>
            <option value="pop">王道進行 (4536)</option>
            <option value="komuro">小室進行 (6451)</option>
            <option value="simple">基本 (1451)</option>
        </select>
        <button class="btn" style="background:#2196f3;" onclick="generateProgression()">✨ 進行生成</button>
        <button class="btn" style="background:#e91e63;" onclick="generateFullBackingMeasure()">🎹 1小節伴奏一括生成</button>
        <button class="btn" style="background:#ad1457;" onclick="generateFullBackingToMelodyEnd()">🎹 全小節伴奏一括生成</button>
        <span style="margin: 0 10px; border-left: solid #555;"></span>
        <select id="drumSelect" class="btn" style="background:#333; color:white; border:1px solid #757575; padding: 2px 5px; font-size: 11px;">
            <option value="four">4つ打ち</option>
            <option value="four_beat">4ビート</option>
            <option value="eight_beat">8ビート</option>
            <option value="sixteen_beat">16ビート</option>
        </select>
        <button class="btn" style="background:#757575;" onclick="generateDrum()">🥁 ドラム生成</button>
        <span style="margin: 0 10px; border-left: 1px solid #555;"></span>
        <button id="stepInputBtn" class="btn" style="background:#607d8b;" onclick="toggleStepInput()">🎹 ステップ入力: OFF</button>
        <select id="stepSize" class="btn" style="background:#333; color:white; border:1px solid #607d8b;">
            <option value="0.25">16分</option>
            <option value="0.5" selected>8分</option>
            <option value="1">4分</option>
            <option value="2">2分</option>
            <option value="4">1小節</option>
        </select>
        <select id="phraseStyle" class="btn" style="background:#333; color:white; border:1px solid #00bcd4;">
            <option value="basic">基本</option>
            <option value="pop">ポップ</option>
            <option value="rock">ロック</option>
            <option value="cool">クール</option>
            <option value="dance">ダンス</option>
        </select>
        <button class="btn" style="background:#00bcd4;" onclick="generateMeasurePhrase()">✨ 1小節フレーズ生成</button>
        <button class="btn" style="background:#4caf50;" onclick="bulkInputLyrics()">🎤 歌詞一括入力</button>
        <button id="ttsBtn" class="btn" style="background:#607d8b;" onclick="toggleTTS()">🔊 読み上げ: OFF</button>
    </div>
    
    <div id="editor-layout">
        <div id="section-sidebar">
            <div id="section-header">構成</div>
            <div id="section-container" style="position: relative; flex-grow: 1; overflow: hidden;">
                <div id="measure-numbers"></div>
                <div id="section-inner" style="position: absolute; top: 0; left: 0; width: 100%; z-index: 10;"></div>
            </div>
        </div>
        <div id="tracks-wrapper"></div>
    </div>
</div>

<script>
    const noteNames = ["ド", "ド#", "レ", "レ#", "ミ", "ファ", "ファ#", "ソ", "ソ#", "ラ", "ラ#", "シ"];
    const instrumentConfigs = {
        lyrics: { name: "🎤 歌詞", colors: ["#00e676"] },
        melody: { name: "🎹 メロディー", colors: ["#448AFF", "#2979FF", "#2962FF", "#1565C0"] },
        piano: { name: "🎹 ピアノ", colors: ["#FF4081", "#F50057", "#C51162", "#880E4F"] },
        guitar: { name: "🎸 ギター", colors: ["#FF7043", "#F4511E", "#E64A19", "#BF360C"] },
        bass: { name: "🎸 ベース", colors: ["#7E57C2", "#673AB7", "#5E35B1", "#512DA8"] },
        drums: { name: "🥁 ドラム", colors: ["#757575", "#616161", "#424242", "#212121"] },
        synth: { name: "✨ シンセ", colors: ["#00E676", "#00C853", "#00B0FF", "#0091EA"] },
        flute: { name: "🌬️ フルート", colors: ["#FFD600", "#FFC400", "#FFAB00", "#FF8F00"] }
    };

    let audioCtx, analyser, microphone, isRunning = false, nextTop = 0, currentBlock = null, lastNoteNumber = -1;
    let activeNodes = [], isPlaying = false, masterGain;
    let historyStack = [], redoStack = [];
    let noteHistory = [];
    const HISTORY_SIZE = 8;
    let silenceFrames = 0;
    const MAX_SILENCE_FRAMES = 5;
    let recordStartTime = 0, recordStartTop = 0;
    let pps = 80;
    let countdownTimer = null;
    let activeUtterances = [];

    function updateSpeed(val) {
        pps = parseInt(val);
        document.getElementById('speedValue').innerText = val;
        document.querySelectorAll('.lane-content').forEach(c => {
            c.style.backgroundSize = `100% ${pps * 4}px, 100% ${pps}px`;
        });
        updateMeasureNumbers();
    }

    function updateMeasureNumbers() {
        const container = document.getElementById('measure-numbers');
        container.innerHTML = '';
        const measureHeight = pps * 4;
        const end = getMelodyEnd();
        const numMeasures = Math.max(50, Math.ceil(end / measureHeight) + 10);
        
        for (let i = 0; i < numMeasures; i++) {
            const div = document.createElement('div');
            div.className = 'measure-number';
            div.style.top = (i * measureHeight) + 'px';
            div.style.height = measureHeight + 'px';
            div.innerText = i + 1;
            container.appendChild(div);
        }
    }

    const wrapper = document.getElementById('tracks-wrapper');
    const trackLanes = {};
    const laneContents = {};
    let currentPlayheadY = 0;

    function syncPlayhead(y) {
        currentPlayheadY = y;
        document.querySelectorAll('.playhead').forEach(ph => ph.style.top = y + 'px');
        nextTop = y;
    }

    function rewindToStart() {
        syncPlayhead(0);
        Object.values(laneContents).forEach(c => c.scrollTop = 0);
    }
    
    Object.keys(instrumentConfigs).forEach(instId => {
        const lane = document.createElement('div');
        lane.className = 'track-lane';
        lane.id = `lane-${instId}`;
        if (instId === 'lyrics') lane.style.minWidth = "120px";
        
        const header = document.createElement('div');
        header.className = 'track-header';
        const mainColor = instrumentConfigs[instId].colors[0];
        header.innerHTML = `<div class="track-label" style="cursor:pointer; background: ${mainColor}cc;" title="クリックでこの楽器を全選択">${instrumentConfigs[instId].name}</div>`;
        
        header.querySelector('.track-label').addEventListener('click', () => {
            document.getElementById('currentInst').value = instId;
            document.querySelectorAll('.note-block.selected').forEach(b => b.classList.remove('selected'));
            laneContents[instId].querySelectorAll('.note-block').forEach(b => b.classList.add('selected'));
        });
        
        const pianoContainer = document.createElement('div');
        pianoContainer.className = 'piano-container';
        
        if (instId === 'lyrics') {
            const div = document.createElement('div');
            div.id = `key-${instId}-0`; div.className = 'key lyrics-key';
            div.style.minWidth = "120px"; div.innerText = "歌詞エリア";
            div.addEventListener('mousedown', (e) => { e.preventDefault(); document.getElementById('currentInst').value = instId; startKeyNote(0); });
            pianoContainer.appendChild(div);
        } else if (instId === 'drums') {
            const drumMap = { 36: "ドン", 38: "タン", 42: "チッ" };
            [36, 38, 42].forEach(num => {
                const div = document.createElement('div');
                div.id = `key-${instId}-${num}`; div.className = 'key drum-key';
                div.style.minWidth = "80px"; div.innerText = drumMap[num];
                div.addEventListener('mousedown', (e) => { e.preventDefault(); document.getElementById('currentInst').value = instId; startKeyNote(num); });
                pianoContainer.appendChild(div);
            });
        } else {
            for (let i = 0; i < 48; i++) {
                const div = document.createElement('div'); const num = i + 36;
                div.id = `key-${instId}-${num}`; div.className = [1, 3, 6, 8, 10].includes(i % 12) ? 'key black' : 'key';
                div.addEventListener('mousedown', (e) => { e.preventDefault(); document.getElementById('currentInst').value = instId; startKeyNote(num); });
                pianoContainer.appendChild(div);
            }
        }
        header.appendChild(pianoContainer);
        lane.appendChild(header);

        const content = document.createElement('div');
        content.className = 'lane-content'; content.id = `content-${instId}`;
        
        let isMarquee = false, marqueeEl = null, startX, startY;
        content.addEventListener('mousedown', (e) => {
            if (e.target === content) {
                const rect = content.getBoundingClientRect();
                startX = e.clientX; startY = e.clientY;
                isMarquee = true; marqueeEl = document.createElement('div');
                marqueeEl.className = 'marquee'; content.appendChild(marqueeEl);
                
                const onMouseMove = (me) => {
                    if (!isMarquee) return;
                    const curX = me.clientX, curY = me.clientY;
                    const left = Math.min(startX, curX) - rect.left;
                    const top = Math.min(startY, curY) - rect.top + content.scrollTop;
                    const width = Math.abs(curX - startX), height = Math.abs(curY - startY);
                    marqueeEl.style.left = left + 'px'; marqueeEl.style.top = top + 'px';
                    marqueeEl.style.width = width + 'px'; marqueeEl.style.height = height + 'px';
                    content.querySelectorAll('.note-block').forEach(b => {
                        const bl = parseFloat(b.style.left), bt = parseFloat(b.style.top), bw = parseFloat(b.style.width), bh = parseFloat(b.style.height);
                        if (bl < left+width && bl+bw > left && bt < top+height && bt+bh > top) b.classList.add('selected');
                        else if (!e.ctrlKey) b.classList.remove('selected');
                    });
                };
                const onMouseUp = (me) => {
                    if (isMarquee) {
                        marqueeEl.remove();
                        const endY = me.clientY - rect.top + content.scrollTop;
                        let finalY = endY; const snapT = 15;
                        document.querySelectorAll('.section-block').forEach(sb => {
                            const t = parseFloat(sb.style.top), b = t + parseFloat(sb.style.height);
                            if (Math.abs(endY - t) < snapT) finalY = t; else if (Math.abs(endY - b) < snapT) finalY = b;
                        });
                        syncPlayhead(finalY); isMarquee = false;
                    }
                    document.removeEventListener('mousemove', onMouseMove); document.removeEventListener('mouseup', onMouseUp);
                };
                document.addEventListener('mousemove', onMouseMove); document.addEventListener('mouseup', onMouseUp);
            }
        });
        
        lane.appendChild(content);
        const ph = document.createElement('div'); ph.className = 'playhead'; content.appendChild(ph);
        content.onscroll = () => {
            const st = content.scrollTop;
            Object.values(laneContents).forEach(c => { if(c !== content) c.scrollTop = st; });
            document.getElementById('section-inner').style.transform = `translateY(-${st}px)`;
            document.getElementById('measure-numbers').style.transform = `translateY(-${st}px)`;
        };
        wrapper.appendChild(lane);
        trackLanes[instId] = lane; laneContents[instId] = content;
    });

    window.addEventListener('mouseup', stopKeyNote);
    
    // キーボードショートカット (Ctrl+C, Ctrl+V)
    window.addEventListener('keydown', (e) => {
        if (e.ctrlKey && e.key === 'c') {
            e.preventDefault(); copySelected();
        } else if (e.ctrlKey && e.key === 'v') {
            e.preventDefault(); pasteSelected();
        }
    });

    function detectKeyFromMelody() {
        const blocks = Array.from(document.querySelectorAll('.note-block'));
        if (blocks.length === 0) return;
        const counts = new Array(12).fill(0);
        blocks.forEach(b => counts[parseInt(b.dataset.midi) % 12]++);
        let max = 0; for (let i=1; i<12; i++) if (counts[i] > counts[max]) max = i;
        document.getElementById('keySelect').value = max;
        alert(`判定結果: キーは ${noteNames[max]} です！`);
    }

    function addSection(top, name = "セクション", height = null) {
        const inner = document.getElementById('section-inner');
        const block = document.createElement('div'); block.className = 'section-block';
        
        const mH = pps * 4;
        const finalTop = Math.round(top / mH) * mH;
        const finalHeight = height || mH;
        
        block.style.top = finalTop + 'px'; block.style.height = finalHeight + 'px';
        const label = document.createElement('span'); label.innerText = name; block.appendChild(label);
        const resizer = document.createElement('div'); resizer.className = 'section-resizer'; block.appendChild(resizer);

        const dividers = [];

    function getInstColor(inst, midi) { const colors = instrumentConfigs[inst].colors; return colors[midi % colors.length]; }

    function updatePlayhead(startTime, baseTop, ppsV, maxPos) {

        syncPlayhead(curT);
        Object.values(laneContents).forEach(c => { if (curT > c.scrollTop + c.clientHeight - 100) c.scrollTop = curT - c.clientHeight / 2; });
        requestAnimationFrame(() => updatePlayhead(startTime, baseTop, ppsV, maxPos));
    }

    function createOscillator(midi, startTime, duration = -1, inst = null) {
        const type = inst || document.getElementById('currentInst').value;
        const freq = 440 * Math.pow(2, (midi - 69) / 12);
        const g = audioCtx.createGain(); const nodes = [];
        g.gain.setValueAtTime(0, startTime);
        if (type === 'piano' || type === 'melody') {
            const o1 = audioCtx.createOscillator(), o2 = audioCtx.createOscillator();
            o1.type = 'triangle'; o2.type = 'sine'; o1.frequency.value = freq; o2.frequency.value = freq * 2.01;
            const g1 = audioCtx.createGain(), g2 = audioCtx.createGain(); g1.gain.value = 1.0; g2.gain.value = 0.5;
            const rel = duration > 0 ? duration : 1.5;
            g.gain.linearRampToValueAtTime(0.8, startTime + 0.01); g.gain.exponentialRampToValueAtTime(0.001, startTime + 0.01 + rel);
            o1.connect(g1); g1.connect(g); o2.connect(g2); g2.connect(g); nodes.push(o1, o2); o1.start(startTime); o2.start(startTime);
        } else if (type === 'guitar') {
            const o = audioCtx.createOscillator(); o.type = 'sawtooth'; o.frequency.value = freq;
            const f = audioCtx.createBiquadFilter(); f.type = 'lowpass'; f.frequency.setValueAtTime(4000, startTime); f.frequency.exponentialRampToValueAtTime(400, startTime + 0.5);
            g.gain.linearRampToValueAtTime(0.6, startTime + 0.005); g.gain.exponentialRampToValueAtTime(0.001, startTime + (duration > 0 ? duration : 1.2));
            o.connect(f); f.connect(g); nodes.push(o); o.start(startTime);
        } else if (type === 'bass') {
            const o = audioCtx.createOscillator(); o.type = 'triangle'; o.frequency.value = freq / 2;
            g.gain.linearRampToValueAtTime(0.7, startTime + 0.02); o.connect(g); nodes.push(o); o.start(startTime);
            if (duration > 0) { g.gain.setValueAtTime(0.7, startTime + duration); g.gain.linearRampToValueAtTime(0, startTime + duration + 0.05); }
        } else if (type === 'drums') {
            if (midi === 36) {
                const o = audioCtx.createOscillator(); o.type = 'sine'; o.frequency.setValueAtTime(150, startTime); o.frequency.exponentialRampToValueAtTime(40, startTime + 0.1);
                g.gain.linearRampToValueAtTime(1.0, startTime + 0.01); g.gain.exponentialRampToValueAtTime(0.001, startTime + 0.2);
                o.connect(g); nodes.push(o); o.start(startTime); o.stop(startTime + 0.2);
            } else if (midi === 38) {
                const o = audioCtx.createOscillator(); o.type = 'triangle'; o.frequency.value = 250;
                g.gain.linearRampToValueAtTime(0.8, startTime + 0.01); g.gain.exponentialRampToValueAtTime(0.001, startTime + 0.1);
                o.connect(g); nodes.push(o); o.start(startTime); o.stop(startTime + 0.1);
                const n = audioCtx.createBufferSource(), b = audioCtx.createBuffer(1, audioCtx.sampleRate*0.1, audioCtx.sampleRate), d = b.getChannelData(0);
                for(let i=0; i<d.length; i++) d[i]=Math.random()*2-1; n.buffer = b; const ng = audioCtx.createGain();
                ng.gain.setValueAtTime(0.5, startTime); ng.gain.exponentialRampToValueAtTime(0.001, startTime+0.1);
                n.connect(ng); ng.connect(g); nodes.push(n); n.start(startTime); n.stop(startTime+0.1);
            } else {
                const n = audioCtx.createBufferSource(), b = audioCtx.createBuffer(1, audioCtx.sampleRate*0.05, audioCtx.sampleRate), d = b.getChannelData(0);
                for(let i=0; i<d.length; i++) d[i]=Math.random()*2-1; n.buffer = b; const f = audioCtx.createBiquadFilter(); f.type='highpass'; f.frequency.value=7000;
                const ng = audioCtx.createGain(); ng.gain.setValueAtTime(0.2, startTime); ng.gain.exponentialRampToValueAtTime(0.001, startTime+0.05);
                n.connect(f); f.connect(ng); ng.connect(g); nodes.push(n); n.start(startTime); n.stop(startTime+0.05);
            }
        } else {
            const o = audioCtx.createOscillator(); o.type = 'sawtooth'; o.frequency.value = freq;
            g.gain.linearRampToValueAtTime(0.3, startTime + 0.02); o.connect(g); nodes.push(o); o.start(startTime);
        }

    }

    async function initAudio() { if (!audioCtx) { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); masterGain = audioCtx.createGain(); masterGain.gain.value = 0.7; masterGain.connect(audioCtx.destination); } if (audioCtx.state === 'suspended') await audioCtx.resume(); }

    let pressedKey = -1, keyNodes = null, keyGain = null;

    function toggleStepInput() {

        document.getElementById('stepInputBtn').innerText = isStepInput ? "🎹 ステップ入力: ON" : "🎹 ステップ入力: OFF";
        document.getElementById('stepInputBtn').style.background = isStepInput ? "#ff4081" : "#607d8b";
    }

    async function startKeyNote(num) {
        await initAudio(); if (pressedKey !== -1) stopKeyNote(); pressedKey = num;
        const inst = document.getElementById('currentInst').value;
        const { g, nodes } = createOscillator(num, audioCtx.currentTime, -1, inst); keyGain = g; keyNodes = nodes;
        const keyEl = document.getElementById(`key-${inst}-${num}`);
        if (keyEl) keyEl.classList.add('active'); 
        
        if (isStepInput) {
            saveHistory();
            const step = parseFloat(document.getElementById('stepSize').value);
            const dur = pps * step;
            const b = createNoteElement(num, currentPlayheadY, dur, inst);
            laneContents[inst].appendChild(b);
            syncPlayhead(currentPlayheadY + dur);
        } else if (!isRunning) { 
            saveHistory(); update(); 
        }
    }
    function stopKeyNote() {
        if (pressedKey === -1) return; const inst = document.getElementById('currentInst').value;
        
        // 離した瞬間にスナップ処理を入れる
        if (currentBlock) {
            const vTop = parseFloat(currentBlock.style.top), vH = parseFloat(currentBlock.style.height);
            const vBottom = vTop + vH;
            const nearestLine = Math.round(vBottom / pps) * pps;
            if (Math.abs(vBottom - nearestLine) < 25) { // 25px以内なら吸着
                const newH = Math.max(4, nearestLine - vTop);
                const dh = newH - vH;
                currentBlock.style.height = newH + 'px';
                // 下にある音符をずらす
                document.querySelectorAll('.note-block').forEach(b => {
                    if (b !== currentBlock && parseFloat(b.style.top) >= vTop + vH - 1) {
                        b.style.top = (parseFloat(b.style.top) + dh) + 'px';
                    }
                });
            }
        }

        if (keyGain) { keyGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1); setTimeout(() => { if(keyNodes) keyNodes.forEach(n => { try { n.stop(); } catch(e){} }); }, 200); }
        const keyEl = document.getElementById(`key-${inst}-${pressedKey}`); if (keyEl) keyEl.classList.remove('active'); pressedKey = -1; currentBlock = null; lastNoteNumber = -1;
    }

    function saveHistory() { historyStack.push(JSON.stringify(Array.from(document.querySelectorAll('.note-block')).map(b => ({ midi: b.dataset.midi, inst: b.dataset.inst, top: b.style.top, left: b.style.left, height: b.style.height, color: b.style.backgroundColor, text: b.querySelector('.note-label').innerText })))); if (historyStack.length > 50) historyStack.shift(); redoStack = []; }
    function undo() { if (historyStack.length === 0) return; redoStack.push(JSON.stringify(Array.from(document.querySelectorAll('.note-block')).map(b => ({ midi: b.dataset.midi, inst: b.dataset.inst, top: b.style.top, left: b.style.left, height: b.style.height, color: b.style.backgroundColor, text: b.querySelector('.note-label').innerText })))); applyState(JSON.parse(historyStack.pop())); }
    function applyState(s) { Object.values(laneContents).forEach(c => Array.from(c.querySelectorAll('.note-block')).forEach(b => b.remove())); s.forEach(d => { const b = createNoteElement(parseInt(d.midi), parseInt(d.top), parseInt(d.height), d.inst); b.style.left = d.left; b.style.backgroundColor = d.color; b.querySelector('.note-label').innerText = d.text; laneContents[d.inst].appendChild(b); }); }

    async function toggleMic() {
        await initAudio(); const btn = document.getElementById('toggleBtn');
        if (!isRunning) {
            if (countdownTimer) return; btn.innerText = "準備中...";
            try { microphone = await navigator.mediaDevices.getUserMedia({ audio: true }); } catch (e) { alert("マイク不可"); return; }
            let count = 3; countdownTimer = setInterval(() => {
                if (count > 0) { btn.innerText = `準備... ${count--}`; } else { clearInterval(countdownTimer); countdownTimer = null; startRecordingAfterReady(); }
            }, 1000);
        } else { stopRecording(); }
    }
    function startRecordingAfterReady() { saveHistory(); const s = audioCtx.createMediaStreamSource(microphone); analyser = audioCtx.createAnalyser(); s.connect(analyser); recordStartTime = audioCtx.currentTime; recordStartTop = currentPlayheadY; isRunning = true; document.getElementById('toggleBtn').innerText = "🔴 録音中..."; update(); }
    function stopRecording() { isRunning = false; if (microphone) microphone.getTracks().forEach(t => t.stop()); document.getElementById('toggleBtn').innerText = "録音開始"; }

    function update() {
        if (!isRunning && pressedKey === -1) return;
        const frameStep = pps / 60;
        let ct = isRunning ? recordStartTop + (audioCtx.currentTime - recordStartTime) * pps : nextTop + frameStep;
        if (pressedKey !== -1) nextTop = ct; syncPlayhead(ct);
        Object.values(laneContents).forEach(c => { if (ct > c.scrollTop + c.clientHeight - 100) c.scrollTop = ct - c.clientHeight / 2; });
        
        let noteNum = -1;
        if (pressedKey !== -1) {
            noteNum = pressedKey;
        } else if (isRunning) {
            const buf = new Float32Array(analyser.fftSize); analyser.getFloatTimeDomainData(buf);
            const pitch = autoCorrelate(buf, audioCtx.sampleRate);
            
            if (pitch !== -1) {
                silenceFrames = 0;
                let rawNote = Math.round(12 * Math.log2(pitch / 440) + 69);
                if (rawNote >= 36 && rawNote <= 83) {
                    noteHistory.push(rawNote);
                    if (noteHistory.length > HISTORY_SIZE) noteHistory.shift();

                    const counts = {};
                    let maxCount = 0;
                    let mostFrequent = -1;
                    for (const n of noteHistory) {
                        counts[n] = (counts[n] || 0) + 1;
                        if (counts[n] > maxCount) { maxCount = counts[n]; mostFrequent = n; }
                    }

                    let threshold = (lastNoteNumber === -1) ? 0.5 : (mostFrequent === lastNoteNumber ? 0.3 : 0.8);
                    if (maxCount >= Math.ceil(HISTORY_SIZE * threshold)) {
                        noteNum = mostFrequent;
                    } else if (currentBlock) {
                        noteNum = lastNoteNumber;
                    }
                }
            } else {
                silenceFrames++;
                if (silenceFrames > MAX_SILENCE_FRAMES) {
                    noteNum = -1;
                } else if (currentBlock) {
                    noteNum = lastNoteNumber;
                }
            }
        }

        if (noteNum !== -1) {
            if (noteNum === lastNoteNumber && currentBlock) {
                const oldH = parseFloat(currentBlock.style.height);
                const actualH = Math.max(4, ct - parseFloat(currentBlock.style.top));
                const deltaH = actualH - oldH;
                currentBlock.style.height = actualH + 'px';
                // 録音中のノートの下にあるノートをずらす
                const bt = parseFloat(currentBlock.style.top);
                document.querySelectorAll('.note-block').forEach(b => { if (b !== currentBlock && parseFloat(b.style.top) >= bt + oldH - 1) b.style.top = (parseFloat(b.style.top) + deltaH) + 'px'; });
            }
            else if (noteNum >= 36 && noteNum <= 83) { 
                const inst = document.getElementById('currentInst').value; 
                const b = createNoteElement(noteNum, ct, 4, inst); 
                laneContents[inst].appendChild(b); 
                currentBlock = b; lastNoteNumber = noteNum; 
            }
        } else { 
            lastNoteNumber = -1; currentBlock = null; 
        }
        requestAnimationFrame(update);
    }

    function autoCorrelate(buf, sr) {
        let rms = 0; for (let i=0; i<buf.length; i++) rms += buf[i]*buf[i]; 
        if (Math.sqrt(rms/buf.length) < 0.02) return -1;
        let c = new Float32Array(buf.length); for (let i=0; i<buf.length; i++) for (let j=0; j<buf.length-i; j++) c[i] += buf[j]*buf[j+i];
        let d = 0; while (c[d] > c[d+1]) d++; let maxv = -1, maxp = -1; for (let i=d; i<buf.length; i++) if (c[i] > maxv) { maxv = c[i]; maxp = i; }
        return sr / maxp;
    }

    function createNoteElement(num, top, height, inst) {
        const b = document.createElement('div'); b.className = 'note-block';
        if (inst === 'lyrics') b.classList.add('lyrics-block');
        
        const targetMidi = (inst === 'lyrics') ? 0 : num;
        const keyEl = document.getElementById(`key-${inst}-${targetMidi}`), rect = keyEl.getBoundingClientRect(), crect = laneContents[inst].getBoundingClientRect();
        b.style.width = (rect.width - 2) + 'px'; b.style.left = (rect.left - crect.left) + 'px'; b.style.top = top + 'px'; b.style.height = height + 'px';
        
        let txt = noteNames[num % 12], bg = getInstColor(inst, num);
        if (inst === 'drums') { if (num === 36) { txt = "ドン"; bg = "#f44336"; } else if (num === 38) { txt = "タン"; bg = "#2196f3"; } else if (num === 42) { txt = "チッ"; bg = "#ffeb3b"; b.style.color = "#000"; } }
        else if (inst === 'lyrics') { txt = "歌詞"; bg = "#00e676"; b.style.color = "#000"; }
        
        b.style.backgroundColor = bg; const l = document.createElement('span'); l.className = 'note-label'; l.innerText = txt; b.appendChild(l);
        b.dataset.midi = num; b.dataset.inst = inst; const r = document.createElement('div'); r.className = 'resizer'; b.appendChild(r);
        
        if (inst === 'lyrics') {
            b.ondblclick = (e) => {
                e.stopPropagation();
                const oldT = l.innerText;
                const newT = prompt("歌詞を入力してください:", oldT);
                if (newT !== null) { saveHistory(); l.innerText = newT; }
            };
        }
        
        makeInteractive(b, r); return b;
    }

    function makeInteractive(el, res) {
        let isD = false, isR = false, sy, sh, st, smx, smy, sn = [], allOther = [];
        res.onmousedown = (e) => { saveHistory(); isR = true; sy = e.clientY; sh = parseInt(el.style.height); st = parseFloat(el.style.top); allOther = Array.from(document.querySelectorAll('.note-block')).map(b => ({ el: b, t: parseFloat(b.style.top) })); e.stopPropagation(); };
        el.onmousedown = (e) => { if (isR) return; isD = true; smx = e.clientX; smy = e.clientY; if (!el.classList.contains('selected')) { if (!e.ctrlKey) document.querySelectorAll('.note-block.selected').forEach(b => b.classList.remove('selected')); el.classList.add('selected'); } sn = Array.from(document.querySelectorAll('.note-block.selected')).map(b => ({ el: b, t: parseFloat(b.style.top), l: parseFloat(b.style.left) })); e.stopPropagation(); };
        window.addEventListener('mousemove', (e) => {
            if (isR) { const nh = Math.max(15, sh + (e.clientY - sy)), dh = nh - sh; el.style.height = nh + 'px'; allOther.forEach(n => { if (n.el !== el && n.t >= st + sh - 1) n.el.style.top = (n.t + dh) + 'px'; }); }
            else if (isD) { const dy = e.clientY - smy, dx = e.clientX - smx; sn.forEach(i => { i.el.style.top = (i.t + dy) + 'px'; i.el.style.left = (i.l + dx) + 'px'; updateLabel(i.el); }); }
        });
        window.addEventListener('mouseup', () => { 
            if (isR) {

                const vTop = parseFloat(el.style.top), vH = parseFloat(el.style.height);
                const vBottom = vTop + vH;
                const nearestLine = Math.round(vBottom / pps) * pps;
                if (Math.abs(vBottom - nearestLine) < 25) {

    let isTTSActive = false;
    function toggleTTS() {
        isTTSActive = !isTTSActive;
        const btn = document.getElementById('ttsBtn');
        btn.innerText = isTTSActive ? "🔊 読み上げ: ON" : "🔊 読み上げ: OFF";
        btn.style.background = isTTSActive ? "#ff4081" : "#607d8b";

    async function playMelody() {
        await initAudio(); if (isPlaying) return;
        const startPos = currentPlayheadY, allNotes = Array.from(document.querySelectorAll('.note-block'));
        const blocks = allNotes.filter(b => (parseFloat(b.style.top) + parseFloat(b.style.height)) > startPos).sort((a,b) => parseFloat(a.style.top) - parseFloat(b.style.top));
        if (blocks.length === 0) return;
        
        isPlaying = true;
        activeUtterances = []; // 読み上げリストをリセット
        const maxPos = Math.max(...allNotes.map(b => parseFloat(b.style.top) + parseFloat(b.style.height)));
        const bt = audioCtx.currentTime + 0.1; updatePlayhead(bt, startPos, pps, maxPos);
        
        blocks.forEach(b => {
            const m = parseInt(b.dataset.midi), i = b.dataset.inst, t = parseFloat(b.style.top), h = parseFloat(b.style.height);
            const st = bt + Math.max(0, t - startPos) / pps, dur = h / pps;
            
            if (i === 'lyrics') {
                if (isTTSActive) {
                    // 「井桁」や記号（#）を読み上げから除外する。また「歌詞」という文字も無視する。
                    let txt = b.querySelector('.note-label').innerText.replace(/[#井桁]/g, "").trim();
                    if (txt && txt !== "歌詞") {
                        // 読み上げエンジンの起動ラグを考慮し、50ms早めに命令を出す
                        const delay = (st - audioCtx.currentTime) * 1000 - 50;
                        setTimeout(() => {
                            if (!isPlaying || !isTTSActive) return;
                            // 前の音を即座に消して、次の文字の出だしを鋭くする
                            window.speechSynthesis.cancel();
                            const ut = new SpeechSynthesisUtterance(txt);
                            ut.lang = 'ja-JP';
                            ut.rate = 2.0; // 速度を上げて「もっさり感」を解消
                            activeUtterances.push(ut); 
                            ut.onend = () => { activeUtterances = activeUtterances.filter(a => a !== ut); };
                            window.speechSynthesis.speak(ut);
                            b.classList.add('playing');
                        }, Math.max(0, delay));
                        setTimeout(() => { b.classList.remove('playing'); }, (st + dur - audioCtx.currentTime) * 1000);
                    }
                }
                return;
            }
            
            const { nodes } = createOscillator(m, st, dur, i); activeNodes.push(...nodes);
            setTimeout(() => { if(isPlaying) b.classList.add('playing'); }, (st - audioCtx.currentTime) * 1000);
            setTimeout(() => { b.classList.remove('playing'); }, (st + dur - audioCtx.currentTime) * 1000);
        });
    }

    function stopMelody() { 
        isPlaying = false; 
        activeUtterances = []; // リストを空にする
        activeNodes.forEach(n => { try { n.stop(); } catch(e){} }); 
        activeNodes = []; 
        document.querySelectorAll('.note-block').forEach(b => b.classList.remove('playing'));
        window.speechSynthesis.cancel(); // 読み上げも停止
    }

    function generateProgression() {
        let maxEnd = getMelodyEnd();
        // 何もデータがない場合はとりあえず8小節分生成する
        if (maxEnd <= 0) maxEnd = pps * 4 * 8;
        
        saveHistory();
        const originalPlayhead = currentPlayheadY;
        const mH = pps * 4; 
        
        // 既存の進行ノートを現在の位置から末尾まで削除
        ['bass', 'guitar', 'piano'].forEach(inst => {
            const blocks = Array.from(laneContents[inst].querySelectorAll('.note-block'));
            blocks.forEach(b => {
                if (parseFloat(b.style.top) >= currentPlayheadY - 1) b.remove();
            });
        });

        const type = document.getElementById('progSelect').value;
        const key = parseInt(document.getElementById('keySelect').value);
        const progs = { canon: [0, 4, 5, 2, 3, 0, 3, 4], pop: [3, 4, 2, 5], komuro: [5, 3, 4, 0], simple: [0, 3, 4, 0] };
        const steps = [0, 2, 4, 5, 7, 9, 11];
        const degs = progs[type];
        const bl = pps * 2; 

        let t = Math.floor(currentPlayheadY / mH) * mH;
        while (t < maxEnd) {
            const measureIdx = Math.floor(t / mH);
            let ctProg = t;
            const measureEnd = t + mH;
            while (ctProg < measureEnd - 5) {
                const progStep = (Math.floor((ctProg - t) / bl) + (measureIdx * 2)) % degs.length;
                const d = degs[progStep];
                
                laneContents['bass'].appendChild(createNoteElement(key + steps[d] + 36, ctProg, bl, 'bass'));
                [0, 2, 4].forEach(idx => {
                    const tidx = (d + idx) % 7, oct = Math.floor((d + idx) / 7);
                    laneContents['guitar'].appendChild(createNoteElement(key + steps[tidx] + (oct * 12) + 52, ctProg, bl, 'guitar'));
                    laneContents['piano'].appendChild(createNoteElement(key + steps[tidx] + (oct * 12) + 64, ctProg, bl, 'piano'));
                });
                ctProg += bl;
            }
            t += mH;
        }
        syncPlayhead(originalPlayhead);
        updateMeasureNumbers();
        alert(`🎹 「進行生成」を完了しました。`);
    }

    function generateFullBackingMeasure() {
        saveHistory();
        const originalInst = document.getElementById('currentInst').value;
        
        // ドラム生成（1小節）
        generateDrum(true);
        
        // ベースとギターを「フレーズ生成」ロジックで作成
        document.getElementById('currentInst').value = 'bass';
        generateMeasurePhrase(true);
        
        document.getElementById('currentInst').value = 'guitar';
        generateMeasurePhrase(true);
        
        document.getElementById('currentInst').value = originalInst;
        alert("🎹 1小節の伴奏を一括生成しました（ドラム・ベース・ギター）");
    }

    function generateFullBackingToMelodyEnd() {
        let maxEnd = getMelodyEnd();
        if (maxEnd <= 0) maxEnd = pps * 4 * 8; // デフォルト8小節

        saveHistory();
        const originalPlayhead = currentPlayheadY;
        const mH = pps * 4; // 1小節の幅
        
        // 1. 伴奏レーンを現在の位置から末尾まで一掃
        ['drums', 'bass', 'guitar', 'piano', 'lyrics'].forEach(inst => {
            const blocks = Array.from(laneContents[inst].querySelectorAll('.note-block'));
            blocks.forEach(b => {
                if (parseFloat(b.style.top) >= currentPlayheadY - 1) b.remove();
            });
        });

        const type = document.getElementById('progSelect').value;
        const key = parseInt(document.getElementById('keySelect').value);
        const progs = { canon: [0, 4, 5, 2, 3, 0, 3, 4], pop: [3, 4, 2, 5], komuro: [5, 3, 4, 0], simple: [0, 3, 4, 0] };
        const steps = [0, 2, 4, 5, 7, 9, 11];
        const degs = progs[type];
        const drumType = document.getElementById('drumSelect').value;
        const bl = pps * 2; 

        // 2. メロディの最後（maxEnd）まで1小節ずつループ
        let t = Math.floor(currentPlayheadY / mH) * mH;
        while (t < maxEnd) {
            const measureIdx = Math.floor(t / mH);
            
            // --- ドラム生成 ---
            const h8 = pps / 2;
            for (let i = 0; i < 8; i++) {
                const ct = t + i * h8;
                if (drumType === 'four' || drumType === 'four_beat') {
                    if (i % 2 === 0) { 
                        laneContents['drums'].appendChild(createNoteElement(36, ct, h8 * 2, 'drums'));
                        if (i % 4 === 2) laneContents['drums'].appendChild(createNoteElement(38, ct, h8 * 2, 'drums'));
                    }
                } else if (drumType === 'eight_beat') {
                    if (i % 2 === 0) laneContents['drums'].appendChild(createNoteElement(36, ct, h8, 'drums'));
                    if (i === 2 || i === 6) laneContents['drums'].appendChild(createNoteElement(38, ct, h8, 'drums'));
                    laneContents['drums'].appendChild(createNoteElement(42, ct, h8, 'drums'));
                } else if (drumType === 'sixteen_beat') {
                    const h16 = pps / 4;
                    for(let j=0; j<2; j++) {
                        const ct16 = ct + j * h16;
                        if (i % 4 === 0 && j === 0) laneContents['drums'].appendChild(createNoteElement(36, ct16, h16 * 2, 'drums'));
                        if ((i === 2 || i === 6) && j === 0) laneContents['drums'].appendChild(createNoteElement(38, ct16, h16 * 2, 'drums'));
                        laneContents['drums'].appendChild(createNoteElement(42, ct16, h16, 'drums'));
                    }
                }
            }

            // --- 進行生成 ---
            let ctProg = t;
            const measureEnd = t + mH;
            while (ctProg < measureEnd - 5) {
                const progStep = (Math.floor((ctProg - t) / bl) + (measureIdx * 2)) % degs.length;
                const d = degs[progStep];
                laneContents['bass'].appendChild(createNoteElement(key + steps[d] + 36, ctProg, bl, 'bass'));
                [0, 2, 4].forEach(idx => {
                    const tidx = (d + idx) % 7, oct = Math.floor((d + idx) / 7);
                    laneContents['guitar'].appendChild(createNoteElement(key + steps[tidx] + (oct * 12) + 52, ctProg, bl, 'guitar'));
                    laneContents['piano'].appendChild(createNoteElement(key + steps[tidx] + (oct * 12) + 64, ctProg, bl, 'piano'));
                });
                ctProg += bl;
            }

            // --- 歌詞の土台作成 (メロディのリズムに合わせる) ---
            const melodyInMeasure = Array.from(laneContents['melody'].querySelectorAll('.note-block')).filter(b => {
                const top = parseFloat(b.style.top);
                return top >= t && top < t + mH;
            });
            melodyInMeasure.forEach(mb => {
                const lb = createNoteElement(0, parseFloat(mb.style.top), parseFloat(mb.style.height), 'lyrics');
                lb.querySelector('.note-label').innerText = "歌詞";
                laneContents['lyrics'].appendChild(lb);
            });

            t += mH; 
        }
        
        syncPlayhead(originalPlayhead);
        updateMeasureNumbers();
        alert(`🎹 伴奏と歌詞の土台を一括生成しました。`);
    }

    function getMelodyEnd() {
        let max = 0;
        // 全てのレーンの音符から、最も後ろにある座標を探す
        Object.keys(laneContents).forEach(inst => {
            const blocks = Array.from(laneContents[inst].querySelectorAll('.note-block'));
            blocks.forEach(b => {
                const endPos = parseFloat(b.style.top) + parseFloat(b.style.height);
                if (endPos > max) max = endPos;
            });
        });
        return max;
    }

    function generateBass() {
        const inst = document.getElementById('currentInst').value;
        const mH = pps * 4;
        const startT = Math.floor(currentPlayheadY / mH) * mH;
        
        let sel = Array.from(document.querySelectorAll('.note-block.selected'));
        // 選択がない場合は現在の1小節内のノートを対象にする
        if (sel.length === 0) {
            sel = Array.from(laneContents[inst].querySelectorAll('.note-block')).filter(b => {
                const t = parseFloat(b.style.top);
                return t >= startT && t < startT + mH;
            });
        }
        if (sel.length === 0) return; saveHistory();
        
        let min = Math.min(...sel.map(b => parseFloat(b.style.top))), max = Math.max(...sel.map(b => parseFloat(b.style.top) + parseFloat(b.style.height)));
        for (let t = min; t < max; t += pps) {
            const n = sel.find(b => t >= parseFloat(b.style.top) && t < parseFloat(b.style.top)+parseFloat(b.style.height)) || sel[0];
            let m = parseInt(n.dataset.midi) - 24; while(m < 36) m+=12; while(m > 48) m-=12;
            laneContents['bass'].appendChild(createNoteElement(m, t, pps, 'bass'));
        }
    }

    function generateGuitar() {
        const inst = document.getElementById('currentInst').value;
        const mH = pps * 4;
        const startT = Math.floor(currentPlayheadY / mH) * mH;

        let sel = Array.from(document.querySelectorAll('.note-block.selected'));
        if (sel.length === 0) {
            sel = Array.from(laneContents[inst].querySelectorAll('.note-block')).filter(b => {
                const t = parseFloat(b.style.top);
                return t >= startT && t < startT + mH;
            });
        }
        if (sel.length === 0) return; saveHistory();
        
        let min = Math.min(...sel.map(b => parseFloat(b.style.top))), max = Math.max(...sel.map(b => parseFloat(b.style.top) + parseFloat(b.style.height)));
        const size = parseInt(document.getElementById('chordSize').value), ints = [0, 4, 7, 10, 14, 17, 21];
        for (let t = min; t < max; t += pps) {
            const n = sel.find(b => t >= parseFloat(b.style.top) && t < parseFloat(b.style.top)+parseFloat(b.style.height)) || sel[0];
            let r = parseInt(n.dataset.midi) - 12; while(r < 48) r+=12; while(r > 60) r-=12;
            for(let i=0; i<size; i++) laneContents['guitar'].appendChild(createNoteElement(r+ints[i], t, pps, 'guitar'));
        }
    }

    function generateDrum(skipHistory = false) {
        let maxEnd = getMelodyEnd();
        if (maxEnd <= 0) maxEnd = pps * 4 * 8; // デフォルト8小節

        const type = document.getElementById('drumSelect').value;
        const mH = pps * 4;
        const startTop = Math.floor(currentPlayheadY / mH) * mH;
        if (!skipHistory) saveHistory();
        
        // 既存音符のクリア（現在の位置から末尾まで）
        const existing = Array.from(laneContents['drums'].querySelectorAll('.note-block'));
        existing.forEach(b => {
            if (parseFloat(b.style.top) >= startTop - 1) b.remove();
        });

        // 音符の高さを拍の長さに合わせる (8分音符 = pps/2)
        const h8 = pps / 2;
        const addD = (m, t, h) => laneContents['drums'].appendChild(createNoteElement(m, t, h, 'drums'));
        
        let t = startTop;
        while (t < maxEnd) {
            for (let i = 0; i < 8; i++) {
                const ct = t + i * h8;
                if (type === 'four' || type === 'four_beat') {
                    if (i % 2 === 0) { 
                        addD(36, ct, h8 * 2); // 4分音符の長さ
                        if (i % 4 === 2) addD(38, ct, h8 * 2);
                    }
                } else if (type === 'eight_beat') {
                    if (i % 2 === 0) addD(36, ct, h8); 
                    if (i === 2 || i === 6) addD(38, ct, h8);
                    addD(42, ct, h8); // 8分音符の長さで隙間なく埋める
                } else if (type === 'sixteen_beat') {
                    const h16 = pps / 4;
                    for(let j=0; j<2; j++) {
                        const ct16 = ct + j * h16;
                        if (i % 4 === 0 && j === 0) addD(36, ct16, h16 * 2);
                        if ((i === 2 || i === 6) && j === 0) addD(38, ct16, h16 * 2);
                        addD(42, ct16, h16);
                    }
                }
            }
            t += mH;
        }
        syncPlayhead(startTop);
        if (!skipHistory) alert(`🥁 「ドラム生成」を完了しました。`);
    }

    function generateMeasurePhrase(skipHistory = false) {
        const inst = document.getElementById('currentInst').value;
        const style = document.getElementById('phraseStyle').value;
        const key = parseInt(document.getElementById('keySelect').value);
        const mH = pps * 4;
        const startTop = Math.floor(currentPlayheadY / mH) * mH;
        if (!skipHistory) saveHistory();
        
        // 生成前にクリア
        const existing = Array.from(laneContents[inst].querySelectorAll('.note-block'));
        existing.forEach(b => {
            const t = parseFloat(b.style.top), h = parseFloat(b.style.height);
            if (t < startTop + mH - 1 && t + h > startTop + 1) b.remove();
        });
        
        const steps = [0, 2, 4, 5, 7, 9, 11]; // Major scale
        const scale = steps.map(s => key + s);

        const addNote = (m, t, h, i) => {
            const b = createNoteElement(m, t, h, i);
            laneContents[i].appendChild(b);
            return b;
        };

        if (inst === 'drums') {
            for (let i = 0; i < 8; i++) {
                const ct = startTop + i * (pps / 2);
                if (style === 'basic' || style === 'pop') { 
                    if (i % 4 === 0) addNote(36, ct, 20, 'drums'); 
                    if (i % 4 === 2) addNote(38, ct, 20, 'drums'); 
                    addNote(42, ct, 20, 'drums'); 
                } else if (style === 'rock') {
                    if (i % 4 === 0 || i === 3) addNote(36, ct, 20, 'drums');
                    if (i % 4 === 2) addNote(38, ct, 20, 'drums');
                    addNote(42, ct, 20, 'drums');
                } else if (style === 'dance') {
                    addNote(36, ct, 20, 'drums');
                    if (i % 4 === 2) addNote(38, ct, 20, 'drums');
                    if (i % 2 === 1) addNote(42, ct, 20, 'drums');
                } else if (style === 'cool') {
                    if (i === 0 || i === 3 || i === 6) addNote(36, ct, 20, 'drums');
                    if (i === 2 || i === 7) addNote(38, ct, 20, 'drums');
                    addNote(42, ct, 20, 'drums');
                }
            }
        } else if (inst === 'lyrics') {
            const melodyInMeasure = Array.from(laneContents['melody'].querySelectorAll('.note-block')).filter(b => {
                const t = parseFloat(b.style.top);
                return t >= startTop && t < startTop + mH;
            });
            if (melodyInMeasure.length > 0) {
                melodyInMeasure.forEach(mb => {
                    const lb = addNote(0, parseFloat(mb.style.top), parseFloat(mb.style.height), 'lyrics');
                    lb.querySelector('.note-label').innerText = "歌詞";
                });
            } else {
                for (let i = 0; i < 4; i++) addNote(0, startTop + i * pps, pps, 'lyrics').querySelector('.note-label').innerText = "歌詞";
            }
        } else if (inst === 'bass') {
            const root = scale[0] + 36;
            for (let i = 0; i < 8; i++) {
                const ct = startTop + i * (pps / 2);
                let note = root;
                if (style === 'basic') { if (i % 2 === 0) addNote(note, ct, pps, 'bass'); }
                else if (style === 'pop' || style === 'rock') { addNote(note, ct, pps / 2, 'bass'); }
                else if (style === 'dance') { if (i % 8 === 0 || i % 8 === 3) addNote(note, ct, pps / 2, 'bass'); }
                else if (style === 'cool') { 
                    const n = [0, 0, 7, 0, 4, 0, 7, 10][i];
                    addNote(root + n, ct, pps / 2, 'bass'); 
                }
            }
        } else if (inst === 'guitar') {
            const chords = [0, 2, 4].map(idx => scale[idx] + 48);
            for (let i = 0; i < 4; i++) {
                const ct = startTop + i * pps;
                if (style === 'basic' || style === 'rock') { if (i % 2 === 0) chords.forEach(n => addNote(n, ct, pps * 2, 'guitar')); }
                else if (style === 'pop') { chords.forEach(n => addNote(n, ct, pps * 0.8, 'guitar')); }
                else if (style === 'dance') { if (i % 2 === 1) chords.forEach(n => addNote(n, ct, pps, 'guitar')); }
                else if (style === 'cool') { chords.forEach((n, idx) => addNote(n, ct + idx * (pps/4), pps/4, 'guitar')); }
            }
        } else {
            let ct = startTop;
            for (let i = 0; i < 4; i++) {
                const rnd = Math.floor(Math.random() * 7);
                const note = scale[rnd] + 60;
                let dur = pps;
                if (style === 'cool') {
                    const pattern = [pps*1.5, pps*0.5, pps, pps];
                    dur = pattern[i];
                }
                addNote(note, ct, dur, inst);
                ct += dur;
            }
        }
        syncPlayhead(startTop);
    }

    function deleteSelected() { saveHistory(); document.querySelectorAll('.note-block.selected').forEach(b => b.remove()); }
    function copySelected() { const s = Array.from(document.querySelectorAll('.note-block.selected')); if(s.length) clipboard = s.map(b => ({ midi: b.dataset.midi, inst: b.dataset.inst, top: parseFloat(b.style.top), left: b.style.left, height: b.style.height, text: b.querySelector('.note-label').innerText })); }
    function pasteSelected() {
        if(!clipboard.length) return;
        saveHistory();
        const targetInst = document.getElementById('currentInst').value;
        clipboard.forEach(d => {
            let targetMidi = parseInt(d.midi);
            let targetTop = d.top;

            // 同じ楽器に貼り付ける場合は1拍分(+pps)下にずらす
            if (targetInst === d.inst) {
                targetTop += pps;
            }

            if (targetInst === 'lyrics') targetMidi = 0;
            else if (targetInst === 'drums' && d.inst !== 'drums') targetMidi = 36;
            
            const b = createNoteElement(targetMidi, targetTop, parseFloat(d.height), targetInst);
            if (targetInst === 'lyrics') {
                b.querySelector('.note-label').innerText = d.text;
            }
            laneContents[targetInst].appendChild(b);
        });
    }
    function shiftOctave(d) { saveHistory(); document.querySelectorAll('.note-block.selected').forEach(el => { let m = parseInt(el.dataset.midi) + d*12; if(m>=36 && m<=83) { el.dataset.midi = m; updateLabel(el); } }); }
    function updateLabel(el) { 
        const i = el.dataset.inst, m = parseInt(el.dataset.midi);
        const targetMidi = (i === 'lyrics') ? 0 : m;
        const k = document.getElementById(`key-${i}-${targetMidi}`), rect = k.getBoundingClientRect(), crect = laneContents[i].getBoundingClientRect(); 
        el.style.left = (rect.left - crect.left) + 'px'; el.style.width = (rect.width-2)+'px'; 
        el.style.backgroundColor = getInstColor(i, m); 
        if (i !== 'lyrics') {
            el.querySelector('.note-label').innerText = (i === 'drums') ? el.querySelector('.note-label').innerText : noteNames[m%12]; 
        }
    }

    function generateLyricsFromMelody() {
        const mH = pps * 4;
        const startT = Math.floor(currentPlayheadY / mH) * mH;
        
        let sel = Array.from(document.querySelectorAll('.note-block.selected')).filter(b => b.dataset.inst === 'melody');
        if (sel.length === 0) {
            sel = Array.from(laneContents['melody'].querySelectorAll('.note-block')).filter(b => {
                const t = parseFloat(b.style.top);
                return t >= startT && t < startT + mH;
            });
        }
        if (sel.length === 0) { alert("メロディを選択するか、現在の小節にメロディを置いてください。"); return; }
        saveHistory();
        
        sel.forEach(mb => {
            const lb = createNoteElement(0, parseFloat(mb.style.top), parseFloat(mb.style.height), 'lyrics');
            lb.querySelector('.note-label').innerText = "歌詞";
            laneContents['lyrics'].appendChild(lb);
        });
    }

    function alignNoteEnds() { saveHistory(); const s = Array.from(document.querySelectorAll('.note-block.selected')); if(s.length<2) return; const max = Math.max(...s.map(b => parseFloat(b.style.top)+parseFloat(b.style.height))); s.forEach(b => b.style.height = (max - parseFloat(b.style.top)) + 'px'); }
    function mergeSelected() { saveHistory(); const s = Array.from(document.querySelectorAll('.note-block.selected')).sort((a,b)=>parseFloat(a.style.top)-parseFloat(b.style.top)); if(s.length<2) return; const t = parseFloat(s[0].style.top), b = Math.max(...s.map(x=>parseFloat(x.style.top)+parseFloat(x.style.height))), m = s[0].dataset.midi, i = s[0].dataset.inst; s.forEach(x=>x.remove()); laneContents[i].appendChild(createNoteElement(m, t, b-t, i)); }
    function splitSelected() { saveHistory(); document.querySelectorAll('.note-block.selected').forEach(b => { const h = parseFloat(b.style.height)/2, t = parseFloat(b.style.top), m = b.dataset.midi, i = b.dataset.inst; if(h<15) return; b.remove(); laneContents[i].appendChild(createNoteElement(m, t, h, i)); laneContents[i].appendChild(createNoteElement(m, t+h, h, i)); }); }
    
    let clipboard = [];
    function saveToFile() { const data = JSON.stringify(Array.from(document.querySelectorAll('.note-block')).map(b => ({ midi: b.dataset.midi, inst: b.dataset.inst, top: b.style.top, left: b.style.left, height: b.style.height, color: b.style.backgroundColor, text: b.querySelector('.note-label').innerText }))); const blob = new Blob([data], {type: 'application/json'}); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = `project.json`; a.click(); }
    function loadFromFile() { document.getElementById('fileInput').click(); }
    function handleFileSelect(e) { const f = e.target.files[0]; if(!f) return; const r = new FileReader(); r.onload = (ex) => applyState(JSON.parse(ex.target.result)); r.readAsText(f); }
    function newProject() { if(confirm("新規？")) { Object.values(laneContents).forEach(c => Array.from(c.querySelectorAll('.note-block')).forEach(b => b.remove())); syncPlayhead(0); } }

    updateSpeed(80);
</script>
